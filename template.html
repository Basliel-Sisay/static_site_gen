<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2: Static Site Output</title>
    <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.7;
        padding: 32px;
        max-width: 900px;
        margin: 0 auto;
        background-color: rgb(240, 242, 245);
        color: rgb(26, 32, 44);
    }
    h1, h2, h3 {
        color: rgb(15, 25, 55);
        border-bottom-width: 2px;
        border-bottom-style: solid;
        border-bottom-color: rgb(200, 210, 230);
        padding-bottom: 10px;
        margin-top: 32px;
    }
    strong {
        color: rgb(25, 55, 110);
        font-weight: 600;
    }
    pre {
        background-color: rgb(15, 20, 35);
        color: rgb(210, 220, 240);
        padding: 20px;
        border-radius: 12px;
        overflow-x: auto;
        border-width: 1px;
        border-style: solid;
        border-color: rgb(35, 45, 70);
        font-size: 15px;
        font-family: 'Consolas', 'Monaco', monospace;
    }
    code {
        font-family: 'Consolas', 'Monaco', monospace;
        background-color: rgb(220, 225, 240);
        padding-top: 2px;
        padding-right: 6px;
        padding-bottom: 2px;
        padding-left: 6px;
        border-radius: 4px;
        color: rgb(15, 25, 55);
        font-size: 14px;
    }
    blockquote {
        margin-top: 24px;
        margin-right: 0;
        margin-bottom: 24px;
        margin-left: 0;
        padding-top: 16px;
        padding-right: 24px;
        padding-bottom: 16px;
        padding-left: 24px;
        background-color: rgb(235, 238, 245);
        border-left-width: 5px;
        border-left-style: solid;
        border-left-color: rgb(25, 55, 110);
        font-style: italic;
        color: rgb(40, 50, 75);
    }
    hr {
        border: 0;
        height: 1px;
        background: rgb(190, 200, 220);
        margin-top: 48px;
        margin-bottom: 48px;
    }
    li {
        margin-bottom: 10px;
    }
</style>
</head>
<body>
    <main>
        {{content}}
    </main>
</body>
</html>
